name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build exe
        run: |
          python -m PyInstaller --onefile --windowed --name CloudPhoneManager --add-data "assets;assets" main.py

      - name: Upload exe
        uses: actions/upload-artifact@v4
        with:
          name: CloudPhoneManager-windows-exe
          path: dist/CloudPhoneManager.exe

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: v1.0.${{ github.run_number }}
          files: dist/CloudPhoneManager.exe
          generate_release_notes: true
          fail_on_unmatched_files: true
